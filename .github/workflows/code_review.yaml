name: AI Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - dev
    types: [opened, reopened, synchronize]

jobs:
  code-review:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'review_requested') }}
    runs-on: ubuntu-latest
    steps:
      - name: ChatGPT
        uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: gpt-3.5-turbo
          PROMPT: |
            Please review this PR change and provide friendly and professional feedback like developer in Korean.
            
            Review Criteria:
            1. Code organization & readability (naming, structure, complexity)
            2. Basic security & error handling
            3. Performance considerations
            4. Best practices (reusability, SOLID principles, testability)
            
            Tone & Manner:
            - Start with encouragement and feedback
            - Propose improvements with specific suggestions
            - maintain a friendly and conversational tone
            - Includes professional explanations

            
            Response Format:
            1. Overall impressions and feedback
            2. Key Improvements (2-3)
            3. Recommendation of reference materials or libraries

          top_p: 0.4
          temperature: 0.2
          max_tokens: 4000
          INCLUDE_PATTERNS: '*.js,*.ts,*.jsx,*.tsx'
